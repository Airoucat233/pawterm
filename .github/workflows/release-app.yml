name: Release App

on:
  push:
    tags:
      - 'app/v*'

jobs:
  # ─────────────────────────────────────────────────────────────
  # Android APK — split per ABI
  # ─────────────────────────────────────────────────────────────
  build-apk:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.32.0'
          channel: stable
          cache: true

      - name: Flutter pub get
        run: flutter pub get
        working-directory: app

      - name: Build APKs
        run: flutter build apk --release --split-per-abi
        working-directory: app

      - name: Rename APKs
        run: |
          TAG="${{ github.ref_name }}"   # app/v0.7.5
          VER="${TAG#app/v}"             # 0.7.5
          OUT="app/build/app/outputs/flutter-apk"
          mkdir -p dist
          cp "$OUT/app-arm64-v8a-release.apk"   "dist/pawterm-${VER}-arm64-v8a.apk"
          cp "$OUT/app-armeabi-v7a-release.apk" "dist/pawterm-${VER}-armeabi-v7a.apk"

      - uses: actions/upload-artifact@v4
        with:
          name: android-apks
          path: dist/*.apk
          retention-days: 7

  # ─────────────────────────────────────────────────────────────
  # GitHub Release
  # ─────────────────────────────────────────────────────────────
  release:
    needs: build-apk
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Read server version
        id: server_ver
        run: echo "ver=$(python3 -c "import json; print(json.load(open('server/package.json'))['version'])")" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: "${{ github.ref_name }}  ·  server v${{ steps.server_ver.outputs.ver }}"
          generate_release_notes: true
          files: artifacts/android-apks/*.apk
          body: |
            ## Android Downloads

            - `pawterm-*-arm64-v8a.apk` — modern devices (arm64)
            - `pawterm-*-armeabi-v7a.apk` — older devices

            ## Install Server

            See [README](https://github.com/Airoucat233/pawterm#readme) for server setup.
