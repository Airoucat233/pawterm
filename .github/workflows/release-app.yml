name: Release App

on:
  push:
    tags:
      - 'release/app-v*'

jobs:
  # ─────────────────────────────────────────────────────────────
  # Android APK — split per ABI
  # ─────────────────────────────────────────────────────────────
  build-apk:
    runs-on: ubuntu-latest
    outputs:
      release_exists: ${{ steps.check.outputs.exists }}

    steps:
      - uses: actions/checkout@v4

      - name: Check if release already exists
        id: check
        run: |
          if gh release view "${{ github.ref_name }}" --repo Airoucat233/pawterm &>/dev/null; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "Release already exists — skipping build."
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi
        env:
          GH_TOKEN: ${{ github.token }}

      - uses: actions/setup-java@v4
        if: steps.check.outputs.exists == 'false'
        with:
          distribution: temurin
          java-version: '17'

      - uses: subosito/flutter-action@v2
        if: steps.check.outputs.exists == 'false'
        with:
          flutter-version: '3.32.0'
          channel: stable
          cache: true

      - name: Build APKs
        if: steps.check.outputs.exists == 'false'
        run: bash app/scripts/build-apk.sh

      - uses: actions/upload-artifact@v4
        if: steps.check.outputs.exists == 'false'
        with:
          name: android-apks
          path: dist/*.apk
          retention-days: 7

  # ─────────────────────────────────────────────────────────────
  # GitHub Release
  # ─────────────────────────────────────────────────────────────
  release:
    needs: build-apk
    runs-on: ubuntu-latest
    if: needs.build-apk.outputs.release_exists == 'false'

    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Read server version
        id: server_ver
        run: echo "ver=$(python3 -c "import json; print(json.load(open('server/package.json'))['version'])")" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: "${{ github.ref_name }}  ·  server v${{ steps.server_ver.outputs.ver }}"
          generate_release_notes: true
          files: artifacts/android-apks/*.apk
          body: |
            ## Android Downloads

            - `pawterm-*-arm64-v8a.apk` — modern devices (arm64)
            - `pawterm-*-armeabi-v7a.apk` — older devices

            ## Install Server

            See [README](https://github.com/Airoucat233/pawterm#readme) for server setup.
