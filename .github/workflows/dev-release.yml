name: Dev Release

on:
  push:
    tags:
      - 'dev/v*'

jobs:
  check:
    runs-on: ubuntu-latest
    outputs:
      exists: ${{ steps.check.outputs.exists }}
    steps:
      - name: Check if release already exists
        id: check
        run: |
          if gh release view "${{ github.ref_name }}" --repo Airoucat233/pawterm &>/dev/null; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "Release already exists — skipping build."
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi
        env:
          GH_TOKEN: ${{ github.token }}

  build-apk:
    needs: check
    if: needs.check.outputs.exists == 'false'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.32.0'
          channel: stable
          cache: true

      - name: Build APKs
        run: CI=true bash app/scripts/build-apk.sh

      - uses: actions/upload-artifact@v4
        with:
          name: android-apks
          path: dist/*.apk
          retention-days: 7

  release:
    needs: [check, build-apk]
    if: needs.check.outputs.exists == 'false'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Read versions
        id: ver
        run: |
          SERVER=$(python3 -c "import json; print(json.load(open('server/package.json'))['version'])")
          TAG="${{ github.ref_name }}"
          APP="${TAG#dev/v}"
          echo "server=$SERVER" >> "$GITHUB_OUTPUT"
          echo "app=$APP"      >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release (prerelease)
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: "[dev] v${{ steps.ver.outputs.app }}  ·  server v${{ steps.ver.outputs.server }}"
          generate_release_notes: true
          prerelease: true
          files: |
            artifacts/android-apks/dist/*.apk
          body: |
            > **Dev build** — not for production use.

            ## Downloads

            **Android APK**
            - `pawterm-*-arm64-v8a.apk` — modern devices
            - `pawterm-*-armeabi-v7a.apk` — older devices
