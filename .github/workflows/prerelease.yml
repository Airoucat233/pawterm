name: Prerelease

on:
  push:
    tags:
      - 'prerelease-v*'

permissions:
  contents: write

jobs:
  check:
    runs-on: ubuntu-latest
    outputs:
      exists: ${{ steps.check.outputs.exists }}
    steps:
      - name: Check if release already exists
        id: check
        run: |
          if gh release view "${{ github.ref_name }}" --repo Airoucat233/pawterm &>/dev/null; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "Release already exists — skipping build."
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi
        env:
          GH_TOKEN: ${{ github.token }}

  build-apk:
    needs: check
    if: needs.check.outputs.exists == 'false'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.32.0'
          channel: stable
          cache: true

      - name: Configure Android signing
        run: |
          printf '%s' "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 --decode > app/android/release.jks

      - name: Build APKs
        run: CI=true bash app/scripts/build-apk.sh --prod
        env:
          ANDROID_KEYSTORE_PATH: ${{ github.workspace }}/app/android/release.jks
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}

      - name: Mark APKs as prerelease
        run: |
          for apk in dist/pawterm-*.apk; do
            base="$(basename "$apk")"
            mv "$apk" "dist/pawterm-prerelease-${base#pawterm-}"
          done
          ls -lh dist/*.apk

      - uses: actions/upload-artifact@v4
        with:
          name: android-apks
          path: dist/*.apk
          retention-days: 7

  build-mac:
    needs: check
    if: needs.check.outputs.exists == 'false'
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - name: Build Mac app
        run: CI=true bash mac/scripts/build.sh --prod

      - name: Mark Mac zip as prerelease
        run: |
          zip=$(ls dist/PawTerm-*-mac.zip | head -1)
          base="$(basename "$zip")"
          mv "$zip" "dist/PawTerm-prerelease-${base#PawTerm-}"
          ls -lh dist/PawTerm-*-mac.zip

      - uses: actions/upload-artifact@v4
        with:
          name: mac-zip
          path: dist/PawTerm-*-mac.zip
          retention-days: 7

  release:
    needs: [check, build-apk, build-mac]
    if: needs.check.outputs.exists == 'false'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Read versions
        id: ver
        run: |
          SERVER=$(python3 -c "import json; print(json.load(open('server/package.json'))['version'])")
          TAG="${{ github.ref_name }}"
          APP="${TAG#prerelease-v}"
          echo "server=$SERVER" >> "$GITHUB_OUTPUT"
          echo "app=$APP"      >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release (prerelease)
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: "[prerelease] v${{ steps.ver.outputs.app }}  ·  server v${{ steps.ver.outputs.server }}"
          generate_release_notes: true
          prerelease: true
          files: |
            artifacts/android-apks/*.apk
            artifacts/mac-zip/*.zip
          body: |
            > **Prerelease build** — production app id, signed for in-place upgrades.

            ## Downloads

            **Android APK**
            - `pawterm-prerelease-*-arm64-v8a.apk` — modern devices
            - `pawterm-prerelease-*-armeabi-v7a.apk` — older devices

            **Mac**
            - `PawTerm-prerelease-*-mac.zip` — macOS (Apple Silicon)
